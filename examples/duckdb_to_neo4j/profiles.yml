duckdb_to_neo4j:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: 'warehouse.duckdb'
      threads: 2

    neo4j_dev:
      type: graphbridge

      # ── SQL Engine (RDB side) ──────────────────────────
      sql_engine: duckdb
      sql_engine_config:
        path: 'warehouse.duckdb'

      # ── Graph Engine (Graph DB side) ───────────────────
      graph_engine: neo4j
      graph_scheme: neo4j
      graph_host: '127.0.0.1'
      graph_port: 7687
      graph_database: neo4j
      graph_user: neo4j
      graph_password: 'changeme'
